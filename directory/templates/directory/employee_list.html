<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Телефонний довідник</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="text-center mb-4">
        <h1 class="fw-bold">☎️ Телефонний довідник</h1>
    </div>

    <!-- Пошук + сортування -->
    <div class="row justify-content-center mb-4">
        <div class="col-md-8">

            <form method="get">

                <div class="input-group mb-3 shadow-sm rounded-pill overflow-hidden">

                    <input type="text"
                        name="q"
                        value="{{ query|default:'' }}"
                        class="form-control border-0 px-4"
                        placeholder="Пошук по прізвищу або телефону..."
                        style="height: 48px;">

                    <button class="btn btn-light px-4 border-0">
                        🔍︎
                    </button>

                </div>

                <!-- 🔽 Сортування (по центру під пошуком) -->
                <div class="d-flex justify-content-center">
                    <select name="sort"
                            class="form-select w-auto text-center"
                            onchange="this.form.submit()">

                        <option value="">Сортування</option>

                        <option value="name_asc" {% if current_sort == 'name_asc' %}selected{% endif %}>
                            Прізвище А-Я
                        </option>

                        <option value="name_desc" {% if current_sort == 'name_desc' %}selected{% endif %}>
                            Прізвище Я-А
                        </option>

                        <option value="phone_asc" {% if current_sort == 'phone_asc' %}selected{% endif %}>
                            Телефон ↑
                        </option>

                        <option value="phone_desc" {% if current_sort == 'phone_desc' %}selected{% endif %}>
                            Телефон ↓
                        </option>

                    </select>
                </div>

            </form>

        </div>
    </div>

    <!-- Картки -->
    <div class="row justify-content-center">
        {% for emp in employees %}
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">

                        <h5 class="card-title mb-2">
                            {{ emp.middle_name }}
                        </h5>

                        <p class="text-muted mb-2">
                            {{ emp.first_name }} {{ emp.last_name }}
                        </p>
                        
                        <p class="mb-1">
                            📞 {{ emp.phone|default:"—" }}
                        </p>

                        <!-- <p class="mb-2">
                            ✉️ {{ emp.email|default:"—" }}
                        </p> -->

                        {% for pos in emp.positions.all %}
                            <span class="badge bg-secondary">
                                {{ pos.title }} ({{ pos.org_unit.name }})
                            </span>
                        {% endfor %}

                    </div>
                </div>
            </div>
        {% empty %}
            <div class="text-center">
                <p>Нічого не знайдено</p>
            </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
