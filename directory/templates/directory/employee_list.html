<!DOCTYPE html>
<html>
<head>
    <title>Телефонний довідник</title>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .search-box {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .name {
            font-weight: bold;
            font-size: 16px;
        }

        .phone {
            color: #007bff;
        }

        .email {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

<h1>☎️ Телефонний довідник</h1>

<div class="search-box">
    <input
        type="text"
        name="q"
        placeholder="Пошук (ПІБ, телефон, email)..."
        value="{{ query }}"
        hx-get="/"
        hx-trigger="keyup changed delay:300ms"
        hx-target="#results"
    >
</div>

<div id="results">
    {% include 'directory/partials/employee_cards.html' %}
</div>

</body>
</html>
